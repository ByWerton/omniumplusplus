name: O++ ASM Builder
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install ARM64 Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Assemble O++ Core
        run: |
          # Eğer dosya adın start.s ise:
          aarch64-linux-gnu-as src/start.s -o start.o
          aarch64-linux-gnu-ld start.o -o opp_core

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: O-Plus-Plus-Binary
          path: opp_core
