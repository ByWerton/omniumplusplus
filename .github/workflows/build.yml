name: O++ ASM Builder
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install ARM64 Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Assemble O++
        run: |
          aarch64-linux-gnu-as src/start.s -o start.o
          aarch64-linux-gnu-ld start.o -o opp_core

      - name: Upload Binary
        uses: actions/upload-artifact@v3
        with:
          name: O++_ARM64_Executable
          path: opp_core
